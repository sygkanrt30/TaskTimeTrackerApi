version: '3.8'

services:
  db:
    image: postgres:17.5
    container_name: task_time_tracker_db
    restart: always
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 6758
      POSTGRES_DB: task_time_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - general-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  general-network:
    driver: bridge

volumes:
  postgres_data: